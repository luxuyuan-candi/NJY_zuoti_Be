apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuoti-auth-service
  namespace: zuoti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuoti-auth-service
  template:
    metadata:
      labels:
        app: zuoti-auth-service
    spec:
      containers:
        - name: app
          image: ghcr.io/luxuyuan-candi/njy-zuoti-be:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_MODULE
              value: auth
          envFrom:
            - configMapRef:
                name: zuoti-config
            - secretRef:
                name: zuoti-app-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: zuoti-auth-service
  namespace: zuoti
spec:
  selector:
    app: zuoti-auth-service
  ports:
    - port: 80
      targetPort: 8000
---
